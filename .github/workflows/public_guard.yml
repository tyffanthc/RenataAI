name: public-guard

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

jobs:
  guard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Run FREE/PUBLIC isolation guard
        run: python tools/public_repo_guard.py
